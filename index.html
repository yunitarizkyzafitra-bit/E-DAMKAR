<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAMKAR COMMAND CENTER - Laporan Operasional</title>
    <!-- Library Eksternal -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root { 
            --navy: #1a2a6c; 
            --fire-red: #c0392b; 
            --dark-bg: #1e272e;
            --card-bg: #ffffff;
            --accent-gold: #f1c40f;
            --whatsapp-green: #25d366;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background: #f4f7f6; 
            color: #333; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            -webkit-text-size-adjust: 100%;
        }
        
        /* Header Mewah */
        header { 
            background: linear-gradient(135deg, var(--navy), var(--fire-red)); 
            color: white; 
            padding: 20px; 
            text-align: center; 
            font-size: 22px; 
            font-weight: 800; 
            letter-spacing: 1.5px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            text-transform: uppercase;
        }
        
        @media (min-width: 768px) {
            header { font-size: 26px; padding: 25px; }
        }

        /* Layout Utama Grid Responsif (Android, iPhone, PC) */
        .main-container { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 20px; 
            padding: 15px; 
            flex: 1; 
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        @media (min-width: 992px) {
            .main-container { 
                grid-template-columns: 340px 1fr; 
                gap: 25px; 
                padding: 25px; 
            }
        }
        
        /* Brand / Logo Header di Sidebar secara Profesional */
        .sidebar-brand {
            text-align: center;
            padding: 5px 0 15px 0;
            border-bottom: 2px solid #f1f2f6;
            margin-bottom: 20px;
        }

        .sidebar-brand img {
            width: 75px;
            height: 75px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.12));
            transition: transform 0.3s ease;
        }

        .sidebar-brand img:hover {
            transform: scale(1.05);
        }

        .sidebar-brand h2 {
            font-size: 13px;
            font-weight: 800;
            color: var(--navy);
            margin: 12px 0 4px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }

        .sidebar-brand span {
            font-size: 11px;
            font-weight: 700;
            color: var(--fire-red);
            letter-spacing: 1.2px;
            text-transform: uppercase;
        }

        /* Card Panel */
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.06); 
            margin-bottom: 20px; 
            border-top: 4px solid var(--navy);
            box-sizing: border-box;
        }

        @media (min-width: 768px) {
            .card { padding: 25px; margin-bottom: 25px; }
        }

        .card h3 {
            margin-top: 0;
            color: var(--navy);
            font-size: 17px;
            border-bottom: 2px solid #f1f2f6;
            padding-bottom: 10px;
        }
        
        /* Form & Input Premium (Optimized Touch target untuk mobile) */
        label { font-size: 13px; font-weight: bold; color: #555; display: block; margin-top: 10px; }
        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            margin-top: 5px; 
            border: 1px solid #dcdde1; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; /* Mencegah auto-zoom pada iOS */
            transition: all 0.3s ease;
            background-color: #fff;
        }
        input:focus, select:focus, textarea:focus { 
            border-color: var(--fire-red); 
            outline: none; 
            box-shadow: 0 0 5px rgba(192, 57, 43, 0.3); 
        }
        
        button.btn-submit { 
            background: var(--fire-red); 
            color: white; 
            border: none; 
            padding: 14px; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            margin-top: 15px; 
            transition: background 0.3s, transform 0.1s; 
            font-size: 15px;
        }
        button.btn-submit:hover { background: #a93226; transform: translateY(-2px); }

        /* Floating WhatsApp Center Button */
        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--whatsapp-green);
            color: white;
            border-radius: 50px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            z-index: 1000;
            transition: transform 0.3s ease, background-color 0.3s;
        }
        .whatsapp-float:hover {
            background-color: #1ebe5d;
            transform: scale(1.05);
        }
        .whatsapp-float svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        /* Tabel Estetik Responsif */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; min-width: 450px; }
        th, td { border: 1px solid #f1f2f6; padding: 12px; text-align: left; }
        th { background: #f8f9fa; color: var(--navy); font-weight: 700; }
        tr:nth-child(even) { background-color: #fafbfc; }

        /* Badge Top Performance */
        .top-badge { 
            background: var(--accent-gold); 
            color: #000; 
            padding: 4px 10px; 
            border-radius: 20px; 
            font-weight: 800; 
            font-size: 11px; 
            display: inline-block;
            box-shadow: 0 2px 5px rgba(241, 196, 15, 0.4);
        }

        /* Tombol Ekspor PDF */
        .btn-pdf { 
            background: #27ae60; 
            color: white; 
            border: none; 
            padding: 14px; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            margin-top: 20px; 
            transition: background 0.3s; 
            font-size: 15px;
        }
        .btn-pdf:hover { background: #219653; }

        .filter-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        @media (min-width: 576px) {
            .filter-container { flex-direction: row; justify-content: space-between; align-items: center; }
            .filter-container select { width: 200px; margin-top: 0; }
        }
    </style>
</head>
<body>

    <header>🛡️ DAMKAR COMMAND CENTER 🛡️</header>

    <div class="main-container">
        <!-- Sidebar Input Form -->
        <div class="sidebar">
            <div class="card">
                <!-- Brand & Logo Damkar Kota Palu yang Disematkan Profesional -->
                <div class="sidebar-brand">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/9/9b/Coat_of_arms_of_Palu.png" alt="Logo Damkar Kota Palu" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2965/2965879.png'">
                    <h2>Dinas Pemadam Kebakaran<br>dan Penyelamatan</h2>
                    <span>Kota Palu</span>
                </div>

                <h3>Form Input Operasi</h3>
                <form id="inputForm">
                    <label>Nama Petugas Komandan:</label>
                    <input type="text" id="petugas" placeholder="Contoh: Komandan Budi" required>
                    
                    <label>PIN Akses Pengiriman:</label>
                    <input type="password" id="pin" placeholder="Masukkan PIN Rahasia" maxlength="6" required>
                    
                    <label>Kategori Penyelamatan:</label>
                    <select id="kategori">
                        <option value="Evakuasi Cincin">Evakuasi Cincin</option>
                        <option value="Water Rescue">Water Rescue</option>
                        <option value="Vertical Rescue">Vertical Rescue</option>
                        <option value="Animal Rescue">Animal Rescue</option>
                        <option value="Vehicle Lockout">Vehicle Lockout</option>
                        <option value="Life & Property">Life & Property</option>
                    </select>
                    
                    <label>Uraian Kejadian:</label>
                    <textarea id="uraian" rows="3" placeholder="Lokasi dan detail singkat..." required></textarea>
                    
                    <button type="submit" class="btn-submit">KIRIM LAPORAN</button>
                </form>
            </div>
        </div>

        <!-- Dashboard Konten Utama -->
        <div class="content" id="printableArea">
            <div class="card">
                <div class="filter-container">
                    <h3 style="margin:0; border:none;">Analisis Grafik Bulanan</h3>
                    <select id="bulanFilter" onchange="updateDashboard()">
                        <option value="1">Januari</option><option value="2">Februari</option>
                        <option value="3">Maret</option><option value="4">April</option>
                        <option value="5">Mei</option><option value="6">Juni</option>
                        <option value="7" selected>Juli</option><option value="8">Agustus</option>
                        <option value="9">September</option><option value="10">Oktober</option>
                        <option value="11">November</option><option value="12">Desember</option>
                    </select>
                </div>
                <div style="position: relative; height: 280px; width: 100%;">
                    <canvas id="monthlyChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h3>Statistik & Rekap Program Penyelamatan</h3>
                <div class="table-responsive">
                    <table id="logTable">
                        <tr><th>Program</th><th>Jumlah Operasi</th><th>Indikator Kinerja</th></tr>
                    </table>
                </div>
                <button class="btn-pdf" onclick="exportToPDF()">📥 EKSPOR LAPORAN PDF RESMI</button>
            </div>
        </div>
    </div>

    <!-- Tombol WhatsApp Center Profesional -->
    <a href="https://wa.me/6281245678910?text=Halo%20Command%20Center%20Damkar%20Kota%20Palu,%20saya%20ingin%20melaporkan%20darurat%20kebakaran/penyelamatan." class="whatsapp-float" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>
        <span>WhatsApp Center</span>
    </a>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwj-RiS_KIT7DPOYlom9dEcPxsdynMqfT-yKj4OffpDD7XhkS-tlnBnZRP7Ysau4DZC/exec';
        let rawData = [];
        let myChart = null;

        async function init() {
            try {
                const res = await fetch(WEB_APP_URL);
                rawData = await res.json();
                
                const currentMonth = new Date().getMonth() + 1;
                document.getElementById('bulanFilter').value = currentMonth;
                
                updateDashboard();
            } catch (err) {
                console.error("Gagal memuat data dari Spreadsheet:", err);
            }
        }

        function updateDashboard() {
            const selectedBulan = parseInt(document.getElementById('bulanFilter').value, 10);
            
            const filtered = rawData.filter(item => {
                const itemBulan = parseInt(item.bulan, 10);
                return itemBulan === selectedBulan;
            });

            const labels = ['Evakuasi Cincin', 'Water Rescue', 'Vertical Rescue', 'Animal Rescue', 'Vehicle Lockout', 'Life & Property'];
            
            const counts = labels.map(l => filtered.filter(x => x.kategori && x.kategori.trim() === l).length);
            const maxVal = Math.max(...counts);

            const table = document.getElementById('logTable');
            table.innerHTML = `<tr><th>Program</th><th>Jumlah Operasi</th><th>Indikator Kinerja</th></tr>`;
            
            labels.forEach((label, i) => {
                const isTop = (counts[i] === maxVal && maxVal > 0);
                table.innerHTML += `<tr>
                    <td><strong>${label}</strong></td>
                    <td>${counts[i]} Kasus</td>
                    <td>${isTop ? '<span class="top-badge">🔥 TOP PERFORMANCE</span>' : '<span style="color:#b2bec3;">-</span>'}</td>
                </tr>`;
            });

            const ctx = document.getElementById('monthlyChart').getContext('2d');
            if (myChart) myChart.destroy();

            // Transisi halus (Smooth transition animation) pada Grafik Chart.js
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total Operasi Penyelamatan',
                        data: counts,
                        backgroundColor: '#c0392b',
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        duration: 1000,
                        easing: 'easeInOutQuart'
                    },
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, ticks: { precision: 0 } }
                    }
                }
            });
        }

        document.getElementById('inputForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button');
            submitBtn.disabled = true;
            submitBtn.innerText = "MENGIRIM...";

            const payload = {
                petugas: document.getElementById('petugas').value,
                pin: document.getElementById('pin').value,
                kategori: document.getElementById('kategori').value,
                uraian: document.getElementById('uraian').value
            };

            try {
                const res = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                
                if(result.status === "sukses") {
                    alert("Laporan operasional berhasil dicatat di Command Center!");
                    location.reload();
                } else {
                    alert("Gagal: " + result.message);
                    submitBtn.disabled = false;
                    submitBtn.innerText = "KIRIM LAPORAN";
                }
            } catch (err) {
                alert("Kesalahan jaringan: " + err);
                submitBtn.disabled = false;
                submitBtn.innerText = "KIRIM LAPORAN";
            }
        });

        async function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const element = document.querySelector("#printableArea");
            
            const filterEl = document.querySelector('.filter-container');
            filterEl.style.display = 'none';

            html2canvas(element, { scale: 2 }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth() - 20;
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;

                pdf.setFontSize(16);
                pdf.setTextColor(26, 42, 108);
                pdf.text("LAPORAN RESMI OPERASI PENYELAMATAN DAMKAR", 15, 15);
                
                pdf.addImage(imgData, 'PNG', 10, 25, pdfWidth, pdfHeight);
                pdf.save("Laporan_Resmi_DAMKAR.pdf");
                
                filterEl.style.display = 'flex';
            });
        }

        init();
    </script>
</body>
</html>
