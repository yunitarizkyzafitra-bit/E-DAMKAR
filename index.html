<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAMKAR COMMAND CENTER - Laporan Operasional</title>
    <!-- Library Eksternal -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root { 
            --navy: #1a2a6c; 
            --fire-red: #c0392b; 
            --dark-bg: #1e272e;
            --card-bg: #ffffff;
            --accent-gold: #f1c40f;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background: #f4f7f6; 
            color: #333; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }
        
        /* Header Mewah */
        header { 
            background: linear-gradient(135deg, var(--navy), var(--fire-red)); 
            color: white; 
            padding: 25px; 
            text-align: center; 
            font-size: 26px; 
            font-weight: 800; 
            letter-spacing: 1.5px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            text-transform: uppercase;
        }
        
        /* Layout Utama Grid */
        .main-container { 
            display: grid; 
            grid-template-columns: 340px 1fr; 
            gap: 25px; 
            padding: 25px; 
            flex: 1; 
        }

        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; }
        }
        
        /* Brand / Logo Header di Sidebar secara Profesional */
        .sidebar-brand {
            text-align: center;
            padding: 5px 0 15px 0;
            border-bottom: 2px solid #f1f2f6;
            margin-bottom: 20px;
        }

        .sidebar-brand img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.12));
            transition: transform 0.3s ease;
        }

        .sidebar-brand img:hover {
            transform: scale(1.05);
        }

        .sidebar-brand h2 {
            font-size: 13px;
            font-weight: 800;
            color: var(--navy);
            margin: 12px 0 4px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }

        .sidebar-brand span {
            font-size: 11px;
            font-weight: 700;
            color: var(--fire-red);
            letter-spacing: 1.2px;
            text-transform: uppercase;
        }

        /* Card Panel */
        .card { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.06); 
            margin-bottom: 25px; 
            border-top: 4px solid var(--navy);
        }

        .card h3 {
            margin-top: 0;
            color: var(--navy);
            font-size: 18px;
            border-bottom: 2px solid #f1f2f6;
            padding-bottom: 10px;
        }
        
        /* Form & Input Premium */
        label { font-size: 13px; font-weight: bold; color: #555; display: block; margin-top: 10px; }
        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            margin-top: 5px; 
            border: 1px solid #dcdde1; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 14px;
            transition: all 0.3s ease;
        }
        input:focus, select:focus, textarea:focus { 
            border-color: var(--fire-red); 
            outline: none; 
            box-shadow: 0 0 5px rgba(192, 57, 43, 0.3); 
        }
        
        button.btn-submit { 
            background: var(--fire-red); 
            color: white; 
            border: none; 
            padding: 14px; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            margin-top: 15px; 
            transition: background 0.3s, transform 0.1s; 
            font-size: 15px;
        }
        button.btn-submit:hover { background: #a93226; transform: translateY(-2px); }

        /* Tabel Estetik */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { border: 1px solid #f1f2f6; padding: 12px; text-align: left; }
        th { background: #f8f9fa; color: var(--navy); font-weight: 700; }
        tr:nth-child(even) { background-color: #fafbfc; }

        /* Badge Top Performance */
        .top-badge { 
            background: var(--accent-gold); 
            color: #000; 
            padding: 4px 10px; 
            border-radius: 20px; 
            font-weight: 800; 
            font-size: 11px; 
            display: inline-block;
            box-shadow: 0 2px 5px rgba(241, 196, 15, 0.4);
        }

        /* Tombol Ekspor PDF */
        .btn-pdf { 
            background: #27ae60; 
            color: white; 
            border: none; 
            padding: 14px; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            margin-top: 20px; 
            transition: background 0.3s; 
            font-size: 15px;
        }
        .btn-pdf:hover { background: #219653; }

        .filter-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .filter-container select { width: 200px; margin-top: 0; }
    </style>
</head>
<body>

    <header>🛡️ DAMKAR COMMAND CENTER 🛡️</header>

    <div class="main-container">
        <!-- Sidebar Input Form -->
        <div class="sidebar">
            <div class="card">
                <!-- Brand & Logo Damkar Kota Palu -->
                <div class="sidebar-brand">
                    <img src="https://images.unsplash.com/photo-1541872703-74c5e44368f9?auto=format&fit=crop&q=80&w=200" alt="Logo Damkar Kota Palu" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/9/9b/Coat_of_arms_of_Palu.png'">
                    <h2>Dinas Pemadam Kebakaran<br>dan Penyelamatan</h2>
                    <span>Kota Palu</span>
                </div>

                <h3>Form Input Operasi</h3>
                <form id="inputForm">
                    <label>Nama Petugas Komandan:</label>
                    <input type="text" id="petugas" placeholder="Contoh: Komandan Budi" required>
                    
                    <label>PIN Akses Pengiriman:</label>
                    <input type="password" id="pin" placeholder="Masukkan PIN Rahasia" maxlength="6" required>
                    
                    <label>Kategori Penyelamatan:</label>
                    <select id="kategori">
                        <option value="Evakuasi Cincin">Evakuasi Cincin</option>
                        <option value="Water Rescue">Water Rescue</option>
                        <option value="Vertical Rescue">Vertical Rescue</option>
                        <option value="Animal Rescue">Animal Rescue</option>
                        <option value="Vehicle Lockout">Vehicle Lockout</option>
                        <option value="Life & Property">Life & Property</option>
                    </select>
                    
                    <label>Uraian Kejadian:</label>
                    <textarea id="uraian" rows="3" placeholder="Lokasi dan detail singkat..." required></textarea>
                    
                    <button type="submit" class="btn-submit">KIRIM LAPORAN</button>
                </form>
            </div>
        </div>

        <!-- Dashboard Konten Utama -->
        <div class="content" id="printableArea">
            <div class="card">
                <div class="filter-container">
                    <h3 style="margin:0; border:none;">Analisis Grafik Bulanan</h3>
                    <select id="bulanFilter" onchange="updateDashboard()">
                        <option value="1">Januari</option><option value="2">Februari</option>
                        <option value="3">Maret</option><option value="4">April</option>
                        <option value="5">Mei</option><option value="6">Juni</option>
                        <option value="7" selected>Juli</option><option value="8">Agustus</option>
                        <option value="9">September</option><option value="10">Oktober</option>
                        <option value="11">November</option><option value="12">Desember</option>
                    </select>
                </div>
                <div style="position: relative; height: 280px; width: 100%;">
                    <canvas id="monthlyChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h3>Statistik & Rekap Program Penyelamatan</h3>
                <table id="logTable">
                    <tr><th>Program</th><th>Jumlah Operasi</th><th>Indikator Kinerja</th></tr>
                </table>
                <button class="btn-pdf" onclick="exportToPDF()">📥 EKSPOR LAPORAN PDF RESMI</button>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwEMz52pFh4LNiKI27WyhHBBr2DBmbo6QkDUvoapd0UGd0h3XOzzdxdpb7hPJQp21U2/exec';
        let rawData = [];
        let myChart = null;

        async function init() {
            try {
                const res = await fetch(WEB_APP_URL);
                rawData = await res.json();
                
                const currentMonth = new Date().getMonth() + 1;
                document.getElementById('bulanFilter').value = currentMonth;
                
                updateDashboard();
            } catch (err) {
                console.error("Gagal memuat data dari Spreadsheet:", err);
            }
        }

        function updateDashboard() {
            const selectedBulan = parseInt(document.getElementById('bulanFilter').value, 10);
            
            const filtered = rawData.filter(item => {
                const itemBulan = parseInt(item.bulan, 10);
                return itemBulan === selectedBulan;
            });

            const labels = ['Evakuasi Cincin', 'Water Rescue', 'Vertical Rescue', 'Animal Rescue', 'Vehicle Lockout', 'Life & Property'];
            
            const counts = labels.map(l => filtered.filter(x => x.kategori && x.kategori.trim() === l).length);
            const maxVal = Math.max(...counts);

            const table = document.getElementById('logTable');
            table.innerHTML = `<tr><th>Program</th><th>Jumlah Operasi</th><th>Indikator Kinerja</th></tr>`;
            
            labels.forEach((label, i) => {
                const isTop = (counts[i] === maxVal && maxVal > 0);
                table.innerHTML += `<tr>
                    <td><strong>${label}</strong></td>
                    <td>${counts[i]} Kasus</td>
                    <td>${isTop ? '<span class="top-badge">🔥 TOP PERFORMANCE</span>' : '<span style="color:#b2bec3;">-</span>'}</td>
                </tr>`;
            });

            const ctx = document.getElementById('monthlyChart').getContext('2d');
            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total Operasi Penyelamatan',
                        data: counts,
                        backgroundColor: '#c0392b',
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, ticks: { precision: 0 } }
                    }
                }
            });
        }

        document.getElementById('inputForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button');
            submitBtn.disabled = true;
            submitBtn.innerText = "MENGIRIM...";

            const payload = {
                petugas: document.getElementById('petugas').value,
                pin: document.getElementById('pin').value,
                kategori: document.getElementById('kategori').value,
                uraian: document.getElementById('uraian').value
            };

            try {
                const res = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                
                if(result.status === "sukses") {
                    alert("Laporan operasional berhasil dicatat di Command Center!");
                    location.reload();
                } else {
                    alert("Gagal: " + result.message);
                    submitBtn.disabled = false;
                    submitBtn.innerText = "KIRIM LAPORAN";
                }
            } catch (err) {
                alert("Kesalahan jaringan: " + err);
                submitBtn.disabled = false;
                submitBtn.innerText = "KIRIM LAPORAN";
            }
        });

        async function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const element = document.querySelector("#printableArea");
            
            const filterEl = document.querySelector('.filter-container');
            filterEl.style.display = 'none';

            html2canvas(element, { scale: 2 }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth() - 20;
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;

                pdf.setFontSize(16);
                pdf.setTextColor(26, 42, 108);
                pdf.text("LAPORAN RESMI OPERASI PENYELAMATAN DAMKAR", 15, 15);
                
                pdf.addImage(imgData, 'PNG', 10, 25, pdfWidth, pdfHeight);
                pdf.save("Laporan_Resmi_DAMKAR.pdf");
                
                filterEl.style.display = 'flex';
            });
        }

        init();
    </script>
</body>
</html>
