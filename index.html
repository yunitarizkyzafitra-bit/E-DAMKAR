<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>DAMKAR COMMAND CENTER</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input, select, textarea, button { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { background: #c0392b; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Input Operasi</h2>
        <form id="formInput">
            <input type="text" id="petugas" placeholder="Nama Petugas" required>
            <input type="password" id="pin" placeholder="PIN (123456)" required>
            <select id="kategori">
                <option>Evakuasi Cincin</option><option>Water Rescue</option>
                <option>Animal Rescue</option><option>Life & Property</option>
            </select>
            <textarea id="uraian" placeholder="Uraian Kejadian"></textarea>
            <button type="submit">KIRIM DATA</button>
        </form>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbweWqUujmpWu3RpP80oMb2J7zztA-zxaduFRDJjfYZLDoj8PtofwGUHnaH5h8HjLIjq/exec";

        document.getElementById("formInput").addEventListener("submit", function(e) {
            e.preventDefault();
            const data = {
                petugas: document.getElementById("petugas").value,
                pin: document.getElementById("pin").value,
                kategori: document.getElementById("kategori").value,
                uraian: document.getElementById("uraian").value
            };

            fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(res => {
                if(res.status === "sukses") {
                    alert("Data berhasil tersimpan!");
                    location.reload();
                } else {
                    alert("Gagal: " + res.message);
                }
            })
            .catch(err => alert("Koneksi Error: " + err));
        });
    </script>
</body>
</html>
