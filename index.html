<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAMKAR COMMAND CENTER - Kota Palu</title>
    <!-- Library Eksternal -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root { 
            --navy: #1a2a6c; 
            --fire-red: #c0392b; 
            --dark-bg: #1e272e;
            --card-bg: #ffffff;
            --accent-gold: #f1c40f;
            --whatsapp-green: #25d366; /* Hijau WhatsApp Tetap Dipertahankan */
            --theme-blue: #1a2a6c; /* Warna Biru Profesional untuk Tombol PDF */
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background: #f4f7f6; 
            color: #333; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            -webkit-text-size-adjust: 100%;
        }
        
        header { 
            background: linear-gradient(135deg, var(--navy), var(--fire-red)); 
            color: white; 
            padding: 20px; 
            text-align: center; 
            font-size: 22px; 
            font-weight: 800; 
            letter-spacing: 1.5px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            text-transform: uppercase;
        }
        
        @media (min-width: 768px) {
            header { font-size: 26px; padding: 25px; }
        }

        .main-container { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 20px; 
            padding: 15px; 
            flex: 1; 
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        @media (min-width: 992px) {
            .main-container { 
                grid-template-columns: 340px 1fr; 
                gap: 25px; 
                padding: 25px; 
            }
        }
        
        .sidebar-brand {
            text-align: center;
            padding: 5px 0 15px 0;
            border-bottom: 2px solid #f1f2f6;
            margin-bottom: 20px;
        }

        .sidebar-brand img {
            width: 85px;
            height: 85px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid var(--navy);
            background: #fff;
            padding: 2px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }

        .sidebar-brand img:hover {
            transform: scale(1.05);
        }

        .sidebar-brand h2 {
            font-size: 13px;
            font-weight: 800;
            color: var(--navy);
            margin: 12px 0 4px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }

        .sidebar-brand span {
            font-size: 11px;
            font-weight: 700;
            color: var(--fire-red);
            letter-spacing: 1.2px;
            text-transform: uppercase;
        }

        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.06); 
            margin-bottom: 20px; 
            border-top: 4px solid var(--navy);
            box-sizing: border-box;
        }

        @media (min-width: 768px) {
            .card { padding: 25px; margin-bottom: 25px; }
        }

        .card h3 {
            margin-top: 0;
            color: var(--navy);
            font-size: 17px;
            border-bottom: 2px solid #f1f2f6;
            padding-bottom: 10px;
        }
        
        label { font-size: 13px; font-weight: bold; color: #555; display: block; margin-top: 10px; }
        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            margin-top: 5px; 
            border: 1px solid #dcdde1; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; 
            transition: all 0.3s ease;
            background-color: #fff;
        }
        input:focus, select:focus, textarea:focus { 
            border-color: var(--fire-red); 
            outline: none; 
            box-shadow: 0 0 5px rgba(192, 57, 43, 0.3); 
        }

        /* Styling Toggle PIN Profesional */
        .pin-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .pin-wrapper input {
            padding-right: 45px;
        }
        .toggle-pin-btn {
            position: absolute;
            right: 12px;
            top: 55%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #718093;
            padding: 0;
            margin: 0;
            width: auto;
        }
        .toggle-pin-btn:hover {
            color: var(--fire-red);
        }
        
        button.btn-submit { 
            background: var(--fire-red); 
            color: white; 
            border: none; 
            padding: 14px; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            margin-top: 15px; 
            transition: background 0.3s, transform 0.1s; 
            font-size: 15px;
        }
        button.btn-submit:hover { background: #a93226; transform: translateY(-2px); }

        /* Galeri Dokumentasi Lapangan */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        @media (min-width: 576px) {
            .gallery-grid { grid-template-columns: repeat(3, 1fr); }
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            aspect-ratio: 1/1;
            background: #dfe6e9;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .gallery-item:hover img {
            transform: scale(1.08);
        }
        .gallery-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 42, 108, 0.85);
            color: white;
            font-size: 10px;
            padding: 6px;
            text-align: center;
            font-weight: 600;
        }

        /* Floating WhatsApp Center (Warna Hijau Dipertahankan) */
        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--whatsapp-green);
            color: white;
            border-radius: 50px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            z-index: 1000;
            transition: transform 0.3s ease, background-color 0.3s;
        }
        .whatsapp-float:hover {
            background-color: #1ebe5d;
            transform: scale(1.05);
        }
        .whatsapp-float svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        /* Transparansi & Tabel Akses Data */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; min-width: 500px; }
        th, td { border: 1px solid #f1f2f6; padding: 12px; text-align: left; }
        th { background: #f8f9fa; color: var(--navy); font-weight: 700; }
        tr:nth-child(even) { background-color: #fafbfc; }

        /* Tombol PDF (Warna Diubah Menjadi Biru Profesional) */
        .btn-pdf { 
            background: var(--theme-blue); 
            color: white; 
            border: none; 
            padding: 14px; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            margin-top: 20px; 
            transition: background 0.3s; 
            font-size: 15px;
        }
        .btn-pdf:hover { background: #121d4d; } /* Biru Lebih Gelap Saat Hover */

        .filter-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        @media (min-width: 576px) {
            .filter-container { flex-direction: row; justify-content: space-between; align-items: center; }
            .filter-container select, .filter-container input { width: 200px; margin-top: 0; }
        }
    </style>
</head>
